name: Deploy GH Pages

on:
  push:
    tags:
      - '*'
    branches:
      - lux
  pull_request:
    branches:
      - lux

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          package-manager-cache: false
          node-version: 22
          cache: 'npm'

      - name: Debug commit info
        run: |
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Branch: $(git branch --show-current)"

      - name: Install plugins
        working-directory: ./plugins
        run: |
          echo "Installing plugins..."
          npm ci --force

      - name: Install VCMap-ui
        run: |
          echo "Installing VCMap-ui..."
          npm ci

      - name: Get branch name (merge)
        if: github.event_name != 'pull_request'
        shell: bash
        run: echo "BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/} | tr / -)" >> $GITHUB_ENV

      - name: Get branch name (pull request)
        if: github.event_name == 'pull_request'
        shell: bash
        run: echo "BRANCH_NAME=$(echo ${GITHUB_HEAD_REF} | tr / -)" >> $GITHUB_ENV

      - run: npm run build

      - run: npm run build-preview

      - name: Remove .htaccess before deployment
        run: |
          rm -f dist/.htaccess
          rm -f dist/**/.htaccess

      - name: Debug build output
        run: |
          ls -la dist/ || echo "dist/ n'existe pas"
          echo ""

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # - name: deploy to gh pages
      #   run: |
      #     echo "Deploying to directory: ${{env.BRANCH_NAME}}"
      #     git config --global user.name "github-actions[bot]"
      #     git config --global user.email "github-actions[bot]@users.noreply.github.com"
      #     npx gh-pages --dist dist/ --dest ${{env.BRANCH_NAME}} --remove "${{env.BRANCH_NAME}}/**" --no-history --dotfiles --repo "https://${GITHUB_ACTOR}:${{secrets.GITHUB_TOKEN}}@github.com/${GITHUB_REPOSITORY}.git"

      - name: add PR comment
        uses: thollander/actions-comment-pull-request@v1
        if: github.event_name == 'pull_request'
        with:
          message: 'GitHub Pages links: https://geoportail-luxembourg.github.io/3dviewer/${{env.BRANCH_NAME}}/'
          comment_includes: 'GitHub Pages links:'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: lux-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-artifact
          target_folder: ${{ needs.build.outputs.branch_name }}

      - name: Add PR comment
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v1
        with:
          message: 'GitHub Pages links: ${{ steps.deployment.outputs.page_url }}'
          comment_includes: 'GitHub Pages links:'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
